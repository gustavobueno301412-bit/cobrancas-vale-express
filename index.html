<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAchei o Risco</title>
    <style>
        :root { --blue: #007bff; --green: #25D366; --bg: #121212; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; padding: 15px; margin: 0; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 15px; }
        input { width: 95%; padding: 12px; border-radius: 8px; margin-bottom: 10px; background: #000; color: #fff; border: 1px solid #444; box-sizing: border-box; }
        .box-camera { width: 100%; border-radius: 15px; overflow: hidden; border: 3px solid var(--blue); background: #000; height: 350px; position: relative; }
        video, canvas { width: 100%; height: 100%; object-fit: cover; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-analisar { background: var(--blue); color: white; }
        .btn-whats { background: var(--green); color: white; display: none; }
        .btn-bloqueado { background: #555 !important; cursor: not-allowed; }
        #status { color: #ffc107; font-weight: bold; margin: 15px 0; font-size: 14px; }
        #contador { font-size: 12px; color: #888; margin-top: 5px; }
        #relatorio { background: white; color: #333; padding: 20px; border-radius: 12px; text-align: left; display: none; margin-top: 20px; border-left: 8px solid var(--blue); }
    </style>
</head>
<body>

    <h2 style="color:var(--blue);">🛡️ IAchei o Risco</h2>
   
    <div class="card">
        <input type="password" id="api-key" placeholder="Cole sua Chave API aqui">
        <input type="tel" id="zap-num" placeholder="WhatsApp do Supervisor (DDD + Número)">
        <div id="contador">Usos realizados: 0 / 1499</div>
    </div>

    <div id="status">Iniciando Câmera...</div>

    <div class="box-camera">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <button id="btn-main" class="btn btn-analisar" onclick="executarAuditoria()">IDENTIFICAR RISCO E SOLUÇÃO</button>

    <div id="relatorio">
        <h3 style="margin:0; color:var(--blue);">📋 LAUDO TÉCNICO DE SEGURANÇA</h3>
        <p id="conteudo-laudo" style="white-space: pre-wrap; font-size: 14px;"></p>
    </div>

    <button id="btn-whats" class="btn btn-whats" onclick="enviarWhatsApp()">ENVIAR PARA MANUTENÇÃO</button>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    const btnMain = document.getElementById('btn-main');
    const btnWhats = document.getElementById('btn-whats');
    const conteudoLaudo = document.getElementById('conteudo-laudo');
    const displayContador = document.getElementById('contador');
    const LIMITE_MAXIMO = 1499;

    let usosAtuais = parseInt(localStorage.getItem('IAchei_Usos')) || 0;
    let laudoGerado = "";

    function atualizarInterface() {
        displayContador.innerText = `Usos realizados: ${usosAtuais} / ${LIMITE_MAXIMO}`;
        if (usosAtuais >= LIMITE_MAXIMO) {
            btnMain.innerText = "LIMITE DIÁRIO ATINGIDO";
            btnMain.className = "btn btn-bloqueado";
            btnMain.disabled = true;
            status.innerText = "❌ Limite de 1.499 auditorias atingido.";
        }
    }
    atualizarInterface();

    // Iniciar Câmera Traseira
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(s => { video.srcObject = s; status.innerText = "✅ Sistema Pronto"; })
        .catch(() => { status.innerText = "❌ Erro: Ative a câmera nas configurações."; });

    async function executarAuditoria() {
        if (usosAtuais >= LIMITE_MAXIMO) return;

        const key = document.getElementById('api-key').value.trim();
        if(!key) return alert("Por favor, insira sua Chave API do Gemini!");

        localStorage.setItem('IAchei_Key', key);
        localStorage.setItem('IAchei_Zap', document.getElementById('zap-num').value);

        status.innerText = "🔍 ANALISANDO RISCOS E NORMAS...";
        document.getElementById('relatorio').style.display = "none";
        btnWhats.style.display = "none";

        try {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            const imgBase64 = canvas.toDataURL("image/jpeg", 0.3).split(',')[1];

            // URL Oficial do Gemini 1.5 Flash
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "Aja como Auditor de Segurança do Trabalho. Identifique na imagem: 1. LOCAL, 2. RISCO DETECTADO, 3. NORMA VIOLADA (NR-10, NR-12, NR-35, etc), 4. MEDIDA CORRETIVA (O que deve ser feito para resolver). Seja técnico e direto." },
                            { inlineData: { mimeType: "image/jpeg", data: imgBase64 } }
                        ]
                    }]
                })
            });

            const data = await response.json();
           
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                laudoGerado = data.candidates[0].content.parts[0].text;
               
                // Sucesso: Soma uso e mostra laudo
                usosAtuais++;
                localStorage.setItem('IAchei_Usos', usosAtuais);
                atualizarInterface();

                conteudoLaudo.innerText = laudoGerado;
                document.getElementById('relatorio').style.display = "block";
                btnWhats.style.display = "block";
                status.innerText = "✅ Auditoria Concluída";
            } else {
                status.innerText = "❌ Erro na Chave ou Faturamento (Veja o Console)";
                console.log(data);
            }
        } catch (e) {
            status.innerText = "❌ Falha de Conexão. Use o GitHub HTTPS!";
            console.error(e);
        }
    }

    function enviarWhatsApp() {
        const tel = document.getElementById('zap-num').value.replace(/\D/g, '');
        if(!tel) return alert("Informe o número do WhatsApp!");
        const msg = `*🛡️ IAchei o Risco - LAUDO TÉCNICO*\n\n${laudoGerado}`;
        window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    // Carregar dados salvos ao abrir
    if(localStorage.getItem('IAchei_Key')) document.getElementById('api-key').value = localStorage.getItem('IAchei_Key');
    if(localStorage.getItem('IAchei_Zap')) document.getElementById('zap-num').value = localStorage.getItem('IAchei_Zap');
</script>
</body>
</html>
