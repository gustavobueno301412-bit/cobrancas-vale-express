<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛵📦 VALE EXPRESS - Cobranças</title>
    <style>
        :root { --amarelo: #FFD700; --preto: #000; --card: #121212; --texto: #fff; }
        body { background: var(--preto); color: var(--texto); font-family: sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        header { text-align: center; border-bottom: 2px solid var(--amarelo); padding-bottom: 10px; margin-bottom: 20px; }
        h1 { color: var(--amarelo); letter-spacing: 3px; margin: 0; font-size: 1.8rem; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; background: #222; color: #aaa; border: 1px solid #333; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .tab-btn.active { background: var(--amarelo); color: #000; border: none; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid #222; margin-bottom: 20px; }
        label { display: block; color: var(--amarelo); font-size: 0.8rem; margin-bottom: 4px; font-weight: bold; margin-top: 10px; }
        input { width: 100%; padding: 12px; background: #1e1e1e; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 15px; background: var(--amarelo); color: #000; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
        .item { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--amarelo); position: relative; }
        .price { color: var(--amarelo); font-weight: bold; font-size: 1.2rem; }
        .date-info { font-size: 0.8rem; color: #aaa; display: block; margin-top: 5px; }
        .actions { margin-top: 12px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #333; padding-top: 10px; }
        .btn-check { color: #25D366; background: none; border: none; cursor: pointer; font-weight: bold; }
        .btn-wa-card { background: #25D366; color: white; padding: 10px 15px; border-radius: 5px; text-decoration: none; font-size: 0.8rem; font-weight: bold; display: inline-block; border: none; }
        .total-box { text-align: right; font-size: 1.5rem; font-weight: bold; color: var(--amarelo); padding: 10px; border-top: 1px solid #333; }
        #view-home, #view-hist { display: none; }
        .visible { display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🛵📦 VALE EXPRESS</h1>
        <p style="font-size: 0.7rem; color: #777; letter-spacing: 1px;">SISTEMA DE COBRANÇA DIRETA</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('home')">PENDENTES</button>
        <button class="tab-btn" onclick="switchTab('hist')">HISTÓRICO</button>
    </div>

    <div id="view-home" class="visible">
        <div class="card">
            <label>Empresa</label>
            <input type="text" id="empresa" placeholder="Nome do Cliente">
            <label>WhatsApp</label>
            <input type="text" id="whatsapp" placeholder="Ex: 1299...">
            <label>Valor (R$)</label>
            <input type="text" id="valor" placeholder="0,00">
            <label>Vencimento</label>
            <input type="date" id="vencimento">
            <button class="btn-save" onclick="enviar()">Salvar e Cobrar</button>
        </div>
        <div id="lista-pendentes"></div>
    </div>

    <div id="view-hist">
        <div id="lista-pagos"></div>
        <div class="total-box">Total: R$ <span id="soma-pagos">0,00</span></div>
    </div>
</div>

<script>
    const URL_API = "SUA_URL_AQUI"; // Mantenha a sua URL do Google Apps Script
    let todosDados = JSON.parse(localStorage.getItem('vale_express_dados')) || [];

    function switchTab(tab) {
        document.getElementById('view-home').classList.remove('visible');
        document.getElementById('view-hist').classList.remove('visible');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + tab).classList.add('visible');
        renderizar();
    }

    function salvarLocal() {
        localStorage.setItem('vale_express_dados', JSON.stringify(todosDados));
    }

    function enviar() {
        const empresa = document.getElementById('empresa').value;
        const valor = document.getElementById('valor').value.replace(',', '.');
        const whatsapp = document.getElementById('whatsapp').value;
        const vencimento = document.getElementById('vencimento').value;

        if(!empresa || !valor) return alert("Preencha os campos!");

        const novo = {
            empresa, valor: parseFloat(valor).toFixed(2), whatsapp, vencimento,
            data_entrada: new Date().toLocaleDateString('pt-BR'),
            status: "Pendente",
            id: Date.now() // ID único para não dar erro no botão
        };

        todosDados.push(novo);
        salvarLocal();
        renderizar();
       
        // Limpa campos
        document.getElementById('empresa').value = "";
        document.getElementById('valor').value = "";
        document.getElementById('whatsapp').value = "";

        // Envia para o Google em segundo plano
        fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(novo) });
    }

    function cobrarZap(id) {
        const item = todosDados.find(d => d.id === id);
        if(!item) return;

        let num = item.whatsapp.replace(/\D/g, '');
        if(!num.startsWith('55')) num = '55' + num;

        const msg = `*VALE EXPRESS*%0AOlá *${item.empresa}*, lembramos do serviço de R$ ${item.valor} com vencimento em ${item.vencimento}.`;
       
        const url = `https://api.whatsapp.com/send?phone=${num}&text=${msg}`;
       
        // Tenta um pequeno delay para garantir que o navegador processou o clique
        setTimeout(() => {
            window.location.assign(url);
        }, 100);
    }

    function darBaixa(id) {
        const index = todosDados.findIndex(d => d.id === id);
        todosDados[index].status = "Pago";
        salvarLocal();
        renderizar();
    }

    function renderizar() {
        const pDiv = document.getElementById('lista-pendentes');
        const hDiv = document.getElementById('lista-pagos');
        let hP = '', hH = '', soma = 0;

        todosDados.forEach(item => {
            if(item.status === "Pendente") {
                hP += `
                <div class="item">
                    <strong>${item.empresa}</strong><br>
                    <span class="price">R$ ${item.valor}</span>
                    <span class="date-info">Vence: ${item.vencimento}</span>
                    <div class="actions">
                        <button class="btn-check" onclick="darBaixa(${item.id})">✅ PAGO</button>
                        <button class="btn-wa-card" onclick="cobrarZap(${item.id})">💬 COBRAR</button>
                    </div>
                </div>`;
            } else {
                soma += parseFloat(item.valor);
                hH += `<div class="item" style="border-left-color:#25D366"><strong>${item.empresa}</strong> - R$ ${item.valor}</div>`;
            }
        });

        pDiv.innerHTML = hP || '<p>Tudo em dia!</p>';
        hDiv.innerHTML = hH;
        document.getElementById('soma-pagos').innerText = soma.toFixed(2);
    }

    window.onload = renderizar;
</script>
</body>
</html>
